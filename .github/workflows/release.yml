name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Build a release binary for each supported target and upload it (as a
  # tar.gz on unix, zip on windows) to the GitHub Release that matches the
  # pushed tag. taiki-e/upload-rust-binary-action handles checksums and
  # archive naming.
  # ─────────────────────────────────────────────────────────────────────────
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build & upload to release
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: solignition
          target: ${{ matrix.target }}
          # tar.gz on unix, zip on windows — picked automatically.
          archive: solignition-$tag-$target
          token: ${{ secrets.GITHUB_TOKEN }}
          # Run cross when cross-compiling Linux aarch64 from an x86 runner.
          checksum: sha256

  # ─────────────────────────────────────────────────────────────────────────
  # Publish to crates.io. Only on real release tags (skips -rc / -beta).
  # ─────────────────────────────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: build-binaries
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # Publish the npm meta-package and each per-platform binary package.
  # Skips pre-release tags.
  # ─────────────────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: build-binaries
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Compute version
        id: ver
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" --dir dist

      - name: Stage platform binaries
        run: node npm/scripts/stage-binaries.mjs dist "${{ steps.ver.outputs.value }}"

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for pkg in npm/binaries/*/; do
            echo "Publishing $pkg"
            (cd "$pkg" && npm publish --access public)
          done

      - name: Publish meta package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: (cd npm/cli && npm publish --access public)
